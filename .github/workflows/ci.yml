name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Sürüm kökteki package.json "packageManager" alanından okunur

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: Derle
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
