name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    # Windows: proje bugüne dek yalnız Windows'ta geliştirildi/canlı doğrulandı; testler ve
    # kod Windows yol biçimini (C:\...) varsayıyor. ubuntu-latest'te node:path POSIX davranır
    # (basename "C:\proj\symphony"'yi ayıramaz, join "\" yerine "/" üretir) — CI günlerdir bu
    # yüzden kırıktı (context-map/build.test.ts Z4'ten beri, desktop-launch.test.ts F3'ten beri).
    # ADR-017 Karar 2 zaten Windows'u ilk doğrulanan platform sayıyor; CI'yi gerçeğe eşitliyoruz.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Sürüm kökteki package.json "packageManager" alanından okunur

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Bağımlılıkları kur
        run: pnpm install --frozen-lockfile

      - name: Derle
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
